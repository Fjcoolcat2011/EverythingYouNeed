<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Material Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0f1e;
color:#e5e7eb;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.header{
padding:25px;
border-radius:16px;
background:linear-gradient(135deg,#1e3a8a,#065f46);
margin-bottom:20px;
}

.drop{
border:2px dashed #60a5fa;
padding:30px;
border-radius:16px;
text-align:center;
cursor:pointer;
background:#111827;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:12px;
margin-top:20px;
}

.card{
background:#0f172a;
padding:15px;
border-radius:14px;
display:flex;
align-items:center;
gap:12px;
border:1px solid #1f2937;
}

.icon{
width:42px;
height:42px;
font-size:28px;
display:flex;
align-items:center;
justify-content:center;
background:#111827;
border-radius:10px;
}

.name{font-weight:bold;font-size:16px}
.sub{font-size:11px;color:#94a3b8}
.amount{margin-left:auto;font-size:18px;font-weight:bold}

.hidden{display:none}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>⛏ Minecraft Material Dashboard</h1>

<div class="drop" id="drop">
<input type="file" id="file" hidden>
<h3>Click or drop JSON file here</h3>
</div>
</div>

<div id="app" class="hidden">
<div class="grid" id="grid"></div>
</div>

</div>

<script>
let data=[];

const drop=document.getElementById("drop");
const file=document.getElementById("file");

drop.onclick=()=>file.click();

file.onchange=e=>load(e.target.files[0]);

drop.ondragover=e=>e.preventDefault();
drop.ondrop=e=>{
e.preventDefault();
load(e.dataTransfer.files[0]);
};

function load(f){
const r=new FileReader();
r.onload=e=>{
const json=JSON.parse(e.target.result);

data=json.map(x=>({
name:clean(x.RawItem),
amount:x.TotalEstimate
}));

document.getElementById("app").classList.remove("hidden");
render();
};
r.readAsText(f);
}

function clean(id){
return id.replace("minecraft:","").toLowerCase();
}

/* 🔥 ICON SYSTEM THAT NEVER BREAKS */
function icon(id){

const icons = {
stone:"🪨",
dirt:"🟫",
oak_log:"🪵",
oak_wood:"🪵",
cobblestone:"🪨",
diamond:"💎",
iron_ingot:"⚙️",
gold_ingot:"🟡",
redstone:"🔴",
coal:"⚫",
emerald:"🟢",
grass_block:"🌱",
sand:"🏖️",
glass:"🪟",
water_bucket:"🪣",
lava_bucket:"🔥"
};

return icons[id] || "📦";
}

function pretty(n){
return n.split("_")
.map(w=>w.charAt(0).toUpperCase()+w.slice(1))
.join(" ");
}

function render(){
const grid=document.getElementById("grid");
grid.innerHTML="";

data.forEach(item=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="icon">${icon(item.name)}</div>

<div>
<div class="name">${pretty(item.name)}</div>
<div class="sub">${item.name}</div>
</div>

<div class="amount">${item.amount.toLocaleString()}</div>
`;

grid.appendChild(div);
});
}
</script>

</body>
</html>
