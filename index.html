<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Material Viewer Pro FIXED</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1020;
color:#eef2ff;
}

.wrap{max-width:1200px;margin:auto;padding:20px}

.hero{
background:linear-gradient(135deg,#1e3a8a,#166534);
padding:25px;
border-radius:20px;
}

.drop{
margin-top:15px;
padding:30px;
border:3px dashed #60a5fa;
border-radius:20px;
text-align:center;
cursor:pointer;
background:#111a34;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#0f172a;
border:1px solid #243049;
border-radius:16px;
padding:15px;
display:flex;
align-items:center;
gap:15px;
}

.icon{
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
}

.icon img{
width:48px;
height:48px;
image-rendering: pixelated;
}

.name{font-size:18px;font-weight:700}
.sub{font-size:12px;color:#94a3b8}
.amount{font-size:20px;font-weight:800;margin-left:auto}
.hidden{display:none}
button{
background:#4ade80;
border:none;
padding:8px 12px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap">

<div class="hero">
<h1>⛏ Minecraft Material Viewer (FIXED)</h1>

<div class="drop" id="drop">
<input type="file" id="file" hidden>
<h3>Click or drop JSON file here</h3>
</div>
</div>

<div id="app" class="hidden">
<div class="grid" id="grid"></div>
</div>

</div>

<script>
let data=[];

/* ✅ WORKING ITEM ICON API */
const iconBase = "https://mc-heads.net/item/";

/* ---------------- FILE ---------------- */
const drop=document.getElementById('drop');
const file=document.getElementById('file');

drop.onclick=()=>file.click();

file.onchange=e=>load(e.target.files[0]);

drop.ondragover=e=>e.preventDefault();
drop.ondrop=e=>{
e.preventDefault();
load(e.dataTransfer.files[0]);
};

function load(f){
const r=new FileReader();
r.onload=e=>{
const json=JSON.parse(e.target.result);

data=json.map(x=>({
name:clean(x.RawItem),
amount:x.TotalEstimate
}));

document.getElementById('app').classList.remove('hidden');
render();
};
r.readAsText(f);
}

/* ---------------- HELPERS ---------------- */
function clean(id){
return id.replace("minecraft:","");
}

function pretty(n){
return n.split("_").map(w=>w[0].toUpperCase()+w.slice(1)).join(" ");
}

/* ✅ FIXED ICON SYSTEM */
function icon(name){
const id = name.toLowerCase();

return `
<img src="${iconBase}${id}"
onerror="this.src='https://mc-heads.net/item/stone'">
`;
}

/* ---------------- RENDER ---------------- */
function render(){
const grid=document.getElementById('grid');
grid.innerHTML="";

data.forEach(item=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="icon">${icon(item.name)}</div>

<div>
<div class="name">${pretty(item.name)}</div>
<div class="sub">${item.name}</div>
</div>

<div class="amount">${item.amount.toLocaleString()}</div>
`;

grid.appendChild(div);
});
}
</script>

</body>
</html>
