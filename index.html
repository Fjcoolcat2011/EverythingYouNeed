<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Litematica Material List Viewer</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#111827;color:#e5e7eb}
.container{max-width:1100px;margin:auto;padding:24px}
.card{background:#1f2937;border-radius:18px;padding:20px;margin-bottom:20px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
h1{margin-top:0}
input,button{border:none;border-radius:12px;padding:12px 14px;font-size:15px}
button{background:#22c55e;color:#08110c;font-weight:700;cursor:pointer}
button:hover{filter:brightness(1.08)}
.secondary{background:#374151;color:white}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
#dropzone{border:2px dashed #4b5563;padding:30px;text-align:center;border-radius:18px;cursor:pointer}
#dropzone.drag{border-color:#22c55e;background:#172b1d}
#materials{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.item{background:#111827;padding:14px;border-radius:14px;border:1px solid #374151}
.item.done{opacity:.6}
.itemhead{display:flex;justify-content:space-between;gap:10px;font-weight:bold;margin-bottom:8px}
.small{color:#9ca3af;font-size:13px}
.search{flex:1;min-width:240px}
.progressWrap{background:#374151;border-radius:999px;height:20px;overflow:hidden}
.progressBar{height:100%;width:0%;background:#22c55e;transition:.3s}
.badge{background:#374151;padding:5px 10px;border-radius:999px;font-size:12px}
.hidden{display:none}
pre{white-space:pre-wrap;background:#0b1220;padding:12px;border-radius:12px;overflow:auto}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>⛏ Litematica Material List Viewer</h1>
<p>Upload your exported Litematica JSON and get a searchable checklist / shopping list.</p>
<div id="dropzone">
<input type="file" id="fileInput" accept=".json" hidden>
<p><b>Click to upload</b> or drag your material-list JSON here</p>
</div>
</div>

<div id="app" class="hidden">
<div class="card">
<div class="row">
<input class="search" id="search" placeholder="Search materials... (stone, glass, oak)">
<button onclick="checkAll(false)">Check All</button>
<button class="secondary" onclick="checkAll(true)">Uncheck All</button>
<button onclick="exportChecklist()">Export Progress</button>
<span class="badge" id="stats">0 Items</span>
</div>
<br>
<div class="small">Gathering Progress</div>
<div class="progressWrap"><div class="progressBar" id="progressBar"></div></div>
<div id="progressText" class="small" style="margin-top:8px"></div>
</div>

<div class="card">
<h3>Materials</h3>
<div id="materials"></div>
</div>
</div>

<div class="card">
<details>
<summary>JSON didn't parse? Open Debug Panel</summary>
<pre id="debug"></pre>
</details>
</div>
</div>

<script>
let materials=[];
const fileInput=document.getElementById('fileInput');
const drop=document.getElementById('dropzone');
const materialsDiv=document.getElementById('materials');
const search=document.getElementById('search');

drop.onclick=()=>fileInput.click();
fileInput.onchange=e=>loadFile(e.target.files[0]);

['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{
 e.preventDefault();drop.classList.add('drag');
}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{
 e.preventDefault();drop.classList.remove('drag');
}));
drop.addEventListener('drop',e=>loadFile(e.dataTransfer.files[0]));

search.addEventListener('input',render);

function loadFile(file){
 if(!file) return;
 const reader=new FileReader();
 reader.onload=e=>{
   try{
    const data=JSON.parse(e.target.result);
    document.getElementById('debug').textContent=JSON.stringify(data,null,2).slice(0,8000);
    materials=extractMaterials(data);
    if(!materials.length){
      alert('Could not auto-detect materials structure. Your export may use a different schema. Open Debug Panel below and tell me the format if you want to improve parser.');
      return;
    }
    loadSavedProgress();
    document.getElementById('app').classList.remove('hidden');
    render();
   }catch(err){
    alert('Invalid JSON file');
   }
 }
 reader.readAsText(file);
}

function extractMaterials(data){
 let found=[];
 
 // common patterns
 if(Array.isArray(data.materials)){
   found=data.materials.map(normalize).filter(Boolean);
 }
 else if(Array.isArray(data.items)){
   found=data.items.map(normalize).filter(Boolean);
 }
 else {
   // deep search fallback
   walk(data);
 }
 return mergeDuplicates(found);
 
 function walk(obj){
   if(!obj||typeof obj!=='object') return;
   if(Array.isArray(obj)){
     obj.forEach(walk);return;
   }
   if((obj.item||obj.name||obj.id) && (obj.count||obj.total||obj.amount)){
      const n=normalize(obj);
      if(n) found.push(n);
   }
   for(const k in obj) walk(obj[k]);
 }
}

function normalize(x){
 const name=(x.item||x.name||x.id||'').replace('minecraft:','');
 const count=Number(x.count||x.total||x.amount||0);
 if(!name||!count) return null;
 return {name,count,done:false};
}

function mergeDuplicates(arr){
 const map={};
 arr.forEach(i=>map[i.name]=(map[i.name]||0)+i.count);
 return Object.entries(map).map(([name,count])=>({name,count,done:false}));
}

function render(){
 const q=search.value.toLowerCase();
 const filtered=materials.filter(m=>m.name.includes(q));
 materialsDiv.innerHTML='';
 filtered.sort((a,b)=>a.done-b.done||b.count-a.count);
 filtered.forEach((m,i)=>{
   const idx=materials.findIndex(x=>x.name===m.name);
   const div=document.createElement('div');
   div.className='item '+(m.done?'done':'');
   div.innerHTML=`
    <div class="itemhead">
      <span>${prettyName(m.name)}</span>
      <span>${m.count.toLocaleString()}</span>
    </div>
    <div class="row">
      <button onclick="toggleDone(${idx})">${m.done?'Collected ✓':'Mark Collected'}</button>
      <span class='small'>${m.name}</span>
    </div>`;
   materialsDiv.appendChild(div);
 })
 document.getElementById('stats').textContent=`${materials.length} Items`;
 updateProgress();
}

function prettyName(n){
 return n.split('_').map(x=>x[0].toUpperCase()+x.slice(1)).join(' ')
}

function toggleDone(i){
 materials[i].done=!materials[i].done;
 saveProgress();
 render();
}

function checkAll(uncheck){
 materials.forEach(m=>m.done=!uncheck);
 saveProgress();
 render();
}

function updateProgress(){
 const done=materials.filter(x=>x.done).length;
 const pct=materials.length?Math.round(done/materials.length*100):0;
 document.getElementById('progressBar').style.width=pct+'%';
 document.getElementById('progressText').textContent=`${done}/${materials.length} material types collected (${pct}%)`;
}

function saveProgress(){
 localStorage.setItem('litematicaChecklist',JSON.stringify(materials));
}
function loadSavedProgress(){
 const saved=JSON.parse(localStorage.getItem('litematicaChecklist')||'null');
 if(!saved) return;
 saved.forEach(s=>{
  const match=materials.find(m=>m.name===s.name);
  if(match) match.done=s.done;
 })
}

function exportChecklist(){
 const blob=new Blob([JSON.stringify(materials,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='material-progress.json';
 a.click();
}
</script>
</body>
</html>
