<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Material Checklist Viewer 1 </title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1020;
color:#e5e7eb;
}

.wrap{max-width:1200px;margin:auto;padding:20px}

.hero{
background:linear-gradient(135deg,#1e3a8a,#065f46);
padding:25px;
border-radius:16px;
}

.drop{
margin-top:15px;
padding:30px;
border:2px dashed #60a5fa;
border-radius:16px;
text-align:center;
cursor:pointer;
background:#111827;
}

.topbar{
margin-top:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:12px;
margin-top:20px;
}

.card{
background:#0f172a;
border:1px solid #1f2937;
padding:12px;
border-radius:14px;
display:flex;
align-items:center;
gap:12px;
cursor:pointer;
transition:0.2s;
}

.card.checked{
border:2px solid #22c55e;
background:#0b1f16;
}

.icon img{
width:42px;
height:42px;
image-rendering: pixelated;
background:#0b1224;
border-radius:8px;
padding:3px;
}

.name{font-weight:bold}
.sub{font-size:11px;color:#94a3b8}
.amount{margin-left:auto;font-size:18px;font-weight:bold}

.checkbox{
width:18px;
height:18px;
accent-color:#22c55e;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="wrap">

<div class="hero">
<h1>⛏ Minecraft Material Checklist Viewer 1 </h1>

<div class="drop" id="drop">
<input type="file" id="file" hidden>
<h3>Click or drop JSON file here</h3>
</div>

<div class="topbar">
<div>Selected: <span id="count">0</span></div>
<button onclick="clearAll()">Clear All</button>
</div>

</div>

<div id="app" class="hidden">
<div class="grid" id="grid"></div>
</div>

</div>

<script>
let data=[];
let checked = new Set();

const drop=document.getElementById("drop");
const file=document.getElementById("file");

drop.onclick=()=>file.click();

file.onchange=e=>load(e.target.files[0]);

drop.ondragover=e=>e.preventDefault();
drop.ondrop=e=>{
e.preventDefault();
load(e.dataTransfer.files[0]);
};

function load(f){
const r=new FileReader();
r.onload=e=>{
const json=JSON.parse(e.target.result);

data=json.map(x=>({
name:clean(x.RawItem),
amount:x.TotalEstimate
}));

checked.clear();
document.getElementById("app").classList.remove("hidden");
render();
updateCount();
};
r.readAsText(f);
}

function clean(id){
return id.replace("minecraft:","").toLowerCase();
}

function pretty(n){
return n.split("_")
.map(w=>w.charAt(0).toUpperCase()+w.slice(1))
.join(" ");
}

/* REAL TEXTURE SYSTEM */
function icon(id){

const base = "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/master/assets/minecraft/textures";

const itemURL = `${base}/item/${id}.png`;
const blockURL = `${base}/block/${id}.png`;

return `
<img src="${itemURL}"
onerror="
this.onerror=null;
this.src='${blockURL}';
this.onerror=function(){
this.src='https://mc-heads.net/item/stone';
}">
`;
}

/* TOGGLE CHECK */
function toggle(name){
if(checked.has(name)){
checked.delete(name);
}else{
checked.add(name);
}
render();
updateCount();
}

function updateCount(){
document.getElementById("count").innerText = checked.size;
}

function clearAll(){
checked.clear();
render();
updateCount();
}

/* RENDER */
function render(){
const grid=document.getElementById("grid");
grid.innerHTML="";

data.forEach(item=>{
const isChecked = checked.has(item.name);

const div=document.createElement("div");
div.className="card" + (isChecked ? " checked" : "");

div.onclick=()=>toggle(item.name);

div.innerHTML=`
<input type="checkbox" class="checkbox" ${isChecked ? "checked" : ""}>

<div class="icon">${icon(item.name)}</div>

<div>
<div class="name">${pretty(item.name)}</div>
<div class="sub">${item.name}</div>
</div>

<div class="amount">${item.amount.toLocaleString()}</div>
`;

grid.appendChild(div);
});
}
</script>

</body>
</html>
