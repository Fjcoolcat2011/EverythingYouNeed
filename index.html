<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scheduled Maintenance</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 15px;
      font-weight: 600;
      color: #f8fafc;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.85;
    }

    .spinner {
      margin: 30px auto;
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .status {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #38bdf8;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.8rem;
      opacity: 0.6;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 18px;
      border-radius: 10px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }

    .button:hover {
      background: #0ea5e9;
    }

  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Your Company</div>

    <h1>We’re Under Maintenance</h1>

    <p>
      We’re currently performing scheduled maintenance to improve your experience.
      Our website will be back online shortly.
    </p>

    <div class="spinner"></div>

    <div class="status">Status: In Progress</div>

    <a href="#" class="button">Check Again</a>

    <div class="footer">
      © 2026 Your Company. All rights reserved.
    </div>
  </div>
</body>
</html>
