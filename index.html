<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft CSS Checklist</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1020;
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.header{
background:linear-gradient(135deg,#1e3a8a,#065f46);
padding:20px;
border-radius:16px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:12px;
}

/* HIDE REAL CHECKBOX */
input[type="checkbox"]{
display:none;
}

/* CARD */
.card{
display:flex;
align-items:center;
gap:12px;
padding:12px;
background:#0f172a;
border:2px solid #1f2937;
border-radius:14px;
cursor:pointer;
transition:0.2s;
}

/* WHEN CHECKED */
input:checked + label{
border:2px solid #22c55e;
background:#0b1f16;
}

/* ICON */
.icon img{
width:42px;
height:42px;
image-rendering: pixelated;
}

/* TEXT */
.name{font-weight:bold}
.sub{font-size:11px;color:#94a3b8}

/* CHECK MARK */
.check{
margin-left:auto;
width:20px;
height:20px;
border:2px solid #64748b;
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
}

input:checked + label .check{
background:#22c55e;
border-color:#22c55e;
}

input:checked + label .check::after{
content:"✔";
font-size:14px;
color:black;
}

/* IMAGE SOURCE FIXED */
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>⛏ Minecraft CSS Checklist UI</h1>
<p>No JS logic — pure CSS interaction styling</p>
</div>

<div class="grid">

<!-- ITEM 1 -->
<input type="checkbox" id="stone">
<label class="card" for="stone">
<div class="icon">
<img src="https://mc-heads.net/item/stone">
</div>
<div>
<div class="name">Stone</div>
<div class="sub">minecraft:stone</div>
</div>
<div class="check"></div>
</label>

<!-- ITEM 2 -->
<input type="checkbox" id="dirt">
<label class="card" for="dirt">
<div class="icon">
<img src="https://mc-heads.net/item/dirt">
</div>
<div>
<div class="name">Dirt</div>
<div class="sub">minecraft:dirt</div>
</div>
<div class="check"></div>
</label>

<!-- ITEM 3 -->
<input type="checkbox" id="diamond">
<label class="card" for="diamond">
<div class="icon">
<img src="https://mc-heads.net/item/diamond">
</div>
<div>
<div class="name">Diamond</div>
<div class="sub">minecraft:diamond</div>
</div>
<div class="check"></div>
</label>

</div>
</div>

</body>
</html>
